<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ kode }} — IT Asset Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 480px;
            width: 100%;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            color: #dee2e6;
        }
        .divider {
            width: 40px;
            height: 3px;
            background: #343a40;
            margin: 1rem auto;
        }
    </style>
</head>
<body>
    <div class="error-card text-center p-4">

        <!-- Kode error besar -->
        <div class="error-code">{{ kode }}</div>
        <div class="divider"></div>

        <!-- Judul dan pesan -->
        <h5 class="fw-bold text-dark mb-2">{{ judul }}</h5>
        <p class="text-muted mb-1">{{ pesan }}</p>
        <p class="text-muted small mb-4">{{ saran }}</p>

        <!-- Tiket error — hanya tampil untuk error 500 -->
        {% if tiket is defined and tiket %}
        <div class="alert alert-light border mb-4 py-2">
            <small class="text-muted">Kode Tiket:</small>
            <div class="fw-bold font-monospace">{{ tiket }}</div>
            <small class="text-muted">
                Tunjukkan kode ini ke IT Support
            </small>
        </div>
        {% endif %}

        <!-- Tombol navigasi -->
        <div class="d-flex gap-2 justify-content-center">
            <a href="/assets" class="btn btn-dark btn-sm">
                Ke Halaman Utama
            </a>
            <button onclick="history.back()"
                    class="btn btn-outline-secondary btn-sm">
                Kembali
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-5">
            <small class="text-muted">
                IT Asset Management System
            </small>
        </div>

    </div>
</body>
</html>

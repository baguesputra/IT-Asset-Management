{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Catat Peminjaman Asset</h5>
            </div>
            <div class="card-body">

                <!-- Info asset yang dipinjam -->
                <div class="alert alert-light border mb-4">
                    <div class="fw-semibold">{{ asset.name }}</div>
                    <div class="text-muted small">
                        {{ asset.type }} · {{ asset.location }}
                    </div>
                </div>

                <form action="/peminjaman/catat/{{ asset.id }}"
                      method="POST">

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Nama Peminjam *
                            </label>
                            <input type="text" name="nama_peminjam"
                                   class="form-control" required
                                   placeholder="Nama lengkap">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Unit / Departemen *
                            </label>
                            <select name="unit_peminjam"
                                    class="form-select" required>
                                <option value="">-- Pilih Unit --</option>
                                {% for u in unit_rs %}
                                <option value="{{ u }}">{{ u }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Tanggal Pinjam *
                            </label>
                            <input type="date" name="tanggal_pinjam"
                                   class="form-control"
                                   value="{{ today }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Rencana Kembali *
                            </label>
                            <input type="date"
                                   name="tanggal_rencana_kembali"
                                   class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Keperluan
                        </label>
                        <textarea name="keperluan"
                                  class="form-control" rows="2"
                                  placeholder="Keperluan peminjaman (opsional)">
                        </textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit"
                                class="btn btn-primary">
                            Catat Peminjaman
                        </button>
                        <a href="/assets/detail/{{ asset.id }}"
                           class="btn btn-outline-secondary">
                            Batal
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

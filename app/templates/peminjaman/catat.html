{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-12 col-md-9">
        <div class="card border-0 shadow-sm animate__animated animate__fadeIn">
            <!-- Header Form -->
            <div class="card-header bg-white py-3 border-bottom border-light">
                <div class="d-flex align-items-center">
                    <div class="bg-primary-subtle text-primary rounded p-2 me-3">
                        <i class="fas fa-clipboard-list fa-lg"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">Catat Peminjaman Asset</h5>
                        <small class="text-muted">Pastikan data peminjam diisi dengan benar</small>
                    </div>
                </div>
            </div>
            
            <div class="card-body p-4">
                <!-- Info Mini Asset yang Dipinjam -->
                <div class="p-3 bg-light rounded-3 border-start border-4 border-primary mb-4">
                    <span class="text-uppercase text-primary fw-bold tracking-wider xsmall d-block mb-1">Asset yang Dipilih</span>
                    <h6 class="fw-bold text-dark mb-1">{{ asset.name }}</h6>
                    <div class="text-muted small">
                        <i class="fas fa-tag me-1 text-secondary"></i> {{ asset.type }} &nbsp;·&nbsp; 
                        <i class="fas fa-map-marker-alt me-1 text-danger"></i> {{ asset.location }}
                    </div>
                </div>

                <!-- Form Peminjaman -->
                <form action="/peminjaman/catat/{{ asset.id }}" method="POST">
                    
                    <!-- Baris 1: Nama & Unit -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-dark">Nama Peminjam <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="far fa-user"></i></span>
                                <input type="text" name="nama_peminjam" class="form-control border-start-0 ps-1" required placeholder="Nama lengkap">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-dark">Unit / Departemen <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-building"></i></span>
                                <select name="unit_peminjam" class="form-select border-start-0 ps-1" required>
                                    <option value="">-- Pilih Unit --</option>
                                    {% for u in unit_rs %}
                                    <option value="{{ u }}">{{ u }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Baris 2: Tanggal Pinjam & Rencana Kembali -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-dark">Tanggal Pinjam <span class="text-danger">*</span></label>
                            <input type="date" name="tanggal_pinjam" class="form-control" value="{{ today }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-dark">Rencana Kembali <span class="text-danger">*</span></label>
                            <input type="date" name="tanggal_rencana_kembali" class="form-control" required>
                        </div>
                    </div>

                    <!-- Baris 3: Keperluan -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-dark">Keperluan Penggunaan</label>
                        <textarea name="keperluan" class="form-control" rows="3" placeholder="Tuliskan alasan atau keperluan peminjaman secara ringkas (opsional)..."></textarea>
                    </div>

                    <!-- Tombol Aksi -->
                    <div class="d-flex flex-row-reverse gap-2 pt-2 border-top border-light">
                        <button type="submit" class="btn btn-primary px-4 shadow-sm fw-medium">
                            <i class="fas fa-save me-1"></i> Simpan Catatan
                        </button>
                        <a href="/assets/detail/{{ asset.id }}" class="btn btn-white border px-4 shadow-sm text-secondary fw-medium">
                            Batal
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- Load FontAwesome via CDN jika belum disertakan di base.html -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Styling Tambahan */
    .xsmall { font-size: 0.7rem; }
    .tracking-wider { letter-spacing: 0.06em; }
    .btn-white { background: #ffffff; }
    .btn-white:hover { background: #f8f9fa; }
    
    /* Fokus efek pada input grup */
    .input-group:focus-within .input-group-text {
        border-color: #86b7fe;
        color: #0d6efd !important;
    }
    .form-control, .form-select {
        border-color: #dee2e6;
    }
    .form-control:focus, .form-select:focus {
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }
</style>
{% endblock %}

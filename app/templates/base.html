<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IT Asset Management</title>
    <!-- Bootstrap CSS — styling siap pakai -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-expand bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/assets">
                🖥️ IT Asset Management
            </a>

            <div class="navbar-nav ms-auto d-flex align-items-center gap-3">
                <a class="nav-link text-white" href="/assets">Asset</a>
                <a class="nav-link text-white" href="/assets/filter">Filter</a>
                <a class="nav-link text-white" href="/assets/statistik">Statistik</a>

                <!-- tampilkan username dan tombol logout -->
                {% if session.get("logged_in") %}
                <span class="text-secondary small">
                    👤 {{ session.get("username") }}
                </span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- Flash messages — pesan sukses/error -->
        {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}

        <!-- konten tiap halaman masuk di sini -->
        {% block content %}{% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — IT Asset Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">

<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-4">

        <!-- header -->
        <div class="text-center mb-4">
            <h4 class="text-white fw-bold">🖥️ IT Asset Management</h4>
            <p class="text-secondary">Sistem Inventaris Aset IT RS</p>
        </div>

        <!-- card login -->
        <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
                <h5 class="card-title mb-4 fw-bold">Login</h5>

                <!-- flash messages -->
                {% for category, message in get_flashed_messages(with_categories=true) %}
                <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                {% endfor %}

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username"
                               class="form-control" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password"
                               class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        Masuk
                    </button>
                </form>

            </div>
        </div>

        <p class="text-center text-secondary mt-3 small">
            IT Department · {{ 2024 }}
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — IT Asset Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            color: #1e293b;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            position: relative;
        }

        /* ── Brand Header ── */
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 56px; height: 56px;
            background: #0d6efd;
            color: white;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 1rem;
            box-shadow: 0 10px 15px -3px rgba(13, 110, 253, 0.2);
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.025em;
            line-height: 1.2;
        }

        .brand-name span { color: #0d6efd; }

        .brand-sub {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        /* ── Card ── */
        .login-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 2.25rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        /* ── Flash Messages ── */
        .alert {
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 1.5rem;
            border: 1px solid;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-danger, .alert-error {
            background: #fef2f2;
            border-color: #fecaca;
            color: #991b1b;
        }
        
        .alert-danger::before {
            content: '\f057';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        .alert-success {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }

        .alert-warning {
            background: rgba(200,160,70,0.08);
            border-color: rgba(200,160,70,0.25);
            color: #d4b870;
        }

        /* ── Form Fields ── */
        .field-group {
            margin-bottom: 1.25rem;
        }

        .field-label {
            display: block;
            font-size: 0.813rem;
            color: #475569;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .field-input {
            width: 100%;
            background: #fcfcfd;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px 15px;
            font-family: inherit;
            font-size: 14px;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease;
        }

        .field-input:focus {
            border-color: #0d6efd;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }

        .field-input::placeholder {
            color: #94a3b8;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: #f1f5f9;
            margin: 2rem 0;
        }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            background: #0d6efd;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: inherit;
            font-size: 0.938rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit:hover  { background: #0b5ed7; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13, 110, 253, 0.25); }
        .btn-submit:active { transform: translateY(0); }

        /* ── Footer ── */
        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 1.5rem;
        }

        .footer-note span {
            margin: 0 6px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    <!-- Brand -->
    <div class="brand-header">
        <div class="brand-icon"><i class="fas fa-laptop-code"></i></div>
        <p class="brand-name">IT<span>ASSET</span></p>
        <p class="brand-sub">Management System</p>
    </div>

    <!-- Card -->
    <div class="login-card">
        <h2 class="card-title">Selamat Datang</h2>
        <p class="card-subtitle">Silakan masuk untuk mengelola inventaris.</p>
        
        <!-- Flash Messages -->
        {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}

        <form action="/login" method="POST">
            <div class="field-group">
                <label class="field-label" for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="field-input"
                    placeholder="Masukkan username"
                    autofocus
                    required>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="field-input"
                    placeholder="••••••••"
                    required>
            </div>

            <div class="divider"></div>

            <button type="submit" class="btn-submit">Masuk</button>
        </form>
    </div>

    <p class="footer-note">
        &copy; {{ 2024 }} IT Department <span>·</span> v1.0
    </p>

</div>

</body>
</html>
